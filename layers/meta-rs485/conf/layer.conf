# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-rs485"
BBFILE_PATTERN_meta-rs485 = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-rs485 = "6"

LAYERSERIES_COMPAT_meta-rs485 = "kirkstone"
