# POKY_BBLAYERS_CONF_VERSION is increased each time build/conf/bblayers.conf
# changes incompatibly
POKY_BBLAYERS_CONF_VERSION = "2"

BBPATH = "${TOPDIR}"
BBFILES ?= ""

BBLAYERS ?= " \
  /workspace/DATN-main/yocto/meta \
  /workspace/DATN-main/yocto/meta-poky \
  /workspace/DATN-main/yocto/meta-yocto-bsp \
  /workspace/layers/meta-rs485 \
  /workspace/layers/meta-raspberrypi \
  /workspace/layers/meta-openembedded/meta-oe \
  /workspace/layers/meta-openembedded/meta-python \
  /workspace/layers/meta-openembedded/meta-networking \
  /workspace/layers/meta-openembedded/meta-multimedia \
  /workspace/DATN-main/yocto/meta-networkconnection \
  "
